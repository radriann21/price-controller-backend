version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: price_controller
    ports:
      - "5499:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z

volumes:
  postgres_data:
